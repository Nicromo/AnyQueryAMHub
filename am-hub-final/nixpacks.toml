[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python3.12 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r requirements.txt"
]

[phases.build]
cmds = ["mkdir -p data"]

# PATH добавляет venv/bin — теперь `uvicorn` найдётся даже без
# абсолютного пути (на случай если Custom Start Command в Railway UI
# переопределит [start] отсюда).
[start]
cmd = "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"

[variables]
PATH = "/opt/venv/bin:$PATH"
