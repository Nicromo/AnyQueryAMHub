<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="../lib/jspdf.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:460px;max-height:600px;overflow-y:auto;font-family:'Segoe UI',system-ui,sans-serif;background:#F8FAFC;color:#0F172A}
    .hdr{background:linear-gradient(135deg,#0F172A,#1E293B);color:#fff;padding:14px 16px 12px}
    .hdr h1{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
    .hdr p{font-size:10px;color:#94A3B8;margin-top:3px}
    .sec{padding:12px 16px}.sec+.sec{border-top:1px solid #E2E8F0}
    label{display:block;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
    input,textarea{width:100%;padding:7px 11px;border-radius:7px;border:1.5px solid #E2E8F0;font-size:12px;font-family:inherit;outline:none}
    input:focus,textarea:focus{border-color:#3B82F6}
    textarea{resize:vertical;min-height:55px}
    .row{display:flex;gap:8px;margin-bottom:8px}.row>*{flex:1}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 14px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;width:100%}
    .btn-p{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.25)}
    .btn-p:disabled{background:#94A3B8;box-shadow:none;cursor:not-allowed}
    .btn-s{background:#fff;color:#475569;border:1.5px solid #E2E8F0}
    .btn-g{background:linear-gradient(135deg,#16A34A,#15803D);color:#fff}
    .tabs{display:flex;gap:2px;margin-bottom:8px}
    .tab{flex:1;padding:6px 4px;text-align:center;font-size:10px;font-weight:700;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;cursor:pointer;border-radius:6px;transition:all .15s}
    .tab.act{background:#0F172A;color:#fff;border-color:#0F172A}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
    .sc{border-radius:7px;padding:7px 6px;text-align:center}
    .sc .n{font-size:18px;font-weight:800}.sc .l{font-size:9px;font-weight:600;margin-top:1px}
    .ri{background:#fff;border-radius:9px;border:1px solid #E2E8F0;padding:9px 12px;margin-bottom:5px;cursor:pointer;transition:background .1s}
    .ri:hover{background:#F8FAFC}
    .ri-top{display:flex;align-items:center;gap:7px}
    .ri-idx{font-weight:800;color:#94A3B8;font-size:11px;min-width:20px}
    .ri-q{font-weight:700;font-size:12px;flex:1}
    .ri-reason{font-size:10px;color:#64748B;margin-top:3px;line-height:1.3}
    .ri-recs{margin-top:6px;padding:6px 8px;background:#F0F9FF;border-radius:6px;border:1px solid #BAE6FD}
    .ri-rec{font-size:10px;margin-bottom:4px;line-height:1.3}
    .ri-rec b{color:#0369A1}.ri-rec .ai{color:#7C3AED}
    .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap}
    .b0{background:#FEF2F2;color:#DC2626}.b1{background:#FFFBEB;color:#D97706}.b2{background:#EFF6FF;color:#2563EB}.b3{background:#F0FDF4;color:#16A34A}
    .flag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:#FEF3C7;color:#92400E;border-radius:4px;font-size:9px;font-weight:600;margin-top:3px;margin-right:3px}
    .prog{height:4px;background:#E2E8F0;border-radius:3px;overflow:hidden;margin:6px 0}
    .prog-f{height:100%;background:linear-gradient(90deg,#3B82F6,#2563EB);border-radius:3px;transition:width .3s}
    .mode-b{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700}
    .mode-api{background:#DBEAFE;color:#1E40AF}.mode-site{background:#FEF3C7;color:#92400E}
    .alert{padding:8px 12px;border-radius:7px;font-size:11px;font-weight:600;margin-bottom:8px}
    .a-info{background:#EFF6FF;color:#1E40AF}.a-warn{background:#FFFBEB;color:#92400E}
    .a-err{background:#FEF2F2;color:#DC2626}.a-ok{background:#F0FDF4;color:#16A34A}
    .empty{text-align:center;padding:24px 16px;color:#94A3B8}
    .empty-i{font-size:28px;margin-bottom:6px}.empty-t{font-size:12px;font-weight:600}
    .actions{display:flex;gap:6px;margin-top:8px}
    .actions .btn{flex:1}
  </style>
</head>
<body>
  <div class="hdr">
    <h1>🔍 Search Quality Checkup v2</h1>
    <p>Автопроверка + ИИ-рекомендации + PDF-отчёт</p>
  </div>

  <div class="sec" id="s-setup">
    <div class="row">
      <div>
        <label>ID кабинета</label>
        <input type="text" id="in-cabinet" placeholder="12345">
      </div>
      <div>
        <label>API Key</label>
        <input type="text" id="in-apikey" placeholder="Авто из базы или вручную">
      </div>
    </div>
    <div class="row">
      <div>
        <label>Имя менеджера</label>
        <input type="text" id="in-manager" placeholder="Для отчёта">
      </div>
      <div>
        <label>Название клиента</label>
        <input type="text" id="in-client" placeholder="Авто из базы">
      </div>
    </div>

    <label>Тип запросов</label>
    <div class="tabs" id="query-tabs">
      <div class="tab act" data-type="top">Топ</div>
      <div class="tab" data-type="random">Случайные</div>
      <div class="tab" data-type="zero">Нулевые</div>
      <div class="tab" data-type="zeroquery">ZeroQ</div>
    </div>

    <label>Запросы (по одному на строку)</label>
    <textarea id="in-queries" rows="4" placeholder="пуховик&#10;куртка&#10;джинсы"></textarea>

    <div class="actions">
      <button class="btn btn-p" id="btn-run">▶ Проверить</button>
      <button class="btn btn-s" id="btn-cal">🎯 Калибровка</button>
    </div>
  </div>

  <div class="sec" id="s-status" style="display:none">
    <div id="d-mode"></div>
    <div id="d-alert"></div>
    <div id="d-prog" style="display:none">
      <div class="prog"><div class="prog-f" id="prog-f"></div></div>
      <div style="font-size:10px;color:#94A3B8" id="prog-t">Проверяю...</div>
    </div>
  </div>

  <div class="sec" id="s-results" style="display:none">
    <div class="stats" id="d-stats"></div>
    <div id="d-results"></div>
    <div class="actions">
      <button class="btn btn-g" id="btn-pdf">📄 PDF-отчёт</button>
      <button class="btn btn-s" id="btn-csv">📥 CSV</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
