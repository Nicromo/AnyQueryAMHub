<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь — AM Hub</title>
  <style>
    :root { --bg:#0a0e1a; --card:#111827; --border:#1e2a3a; --text:#e2e8f0; --muted:#64748b; --accent:#6366f1; --green:#22c55e; --yellow:#eab308; --red:#ef4444; }
    [data-theme="light"] { --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .main { margin-left:240px; padding:24px 28px; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--card); border-right:1px solid var(--border); padding:20px 0; z-index:100; }
    .sidebar-logo { padding:0 20px 20px; border-bottom:1px solid var(--border); }
    .sidebar-logo h1 { font-size:1.1rem; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; color:var(--muted); font-size:.85rem; text-decoration:none; border-left:3px solid transparent; }
    .nav-item:hover { color:var(--text); text-decoration:none; background:rgba(255,255,255,.03); }
    .nav-item.active { color:var(--accent); background:rgba(99,102,241,.12); border-left-color:var(--accent); }
    .sidebar-footer { position:absolute; bottom:0; left:0; right:0; padding:16px 20px; border-top:1px solid var(--border); }
    a { color:var(--accent); text-decoration:none; }
    h1 { font-size:1.4rem; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.82rem; margin-bottom:20px; }
    .theme-btn { position:fixed; top:16px; right:16px; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:1rem; z-index:200; }

    /* Calendar Grid */
    .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .cal-nav { display:flex; gap:8px; align-items:center; }
    .cal-nav button { background:var(--card); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:8px; cursor:pointer; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; background:var(--border); border-radius:12px; overflow:hidden; }
    .cal-day-header { background:var(--bg); padding:8px; text-align:center; font-size:.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; }
    .cal-day { background:var(--card); min-height:100px; padding:6px; position:relative; }
    .cal-day.other-month { opacity:.3; }
    .cal-day.today { background:rgba(99,102,241,.1); }
    .cal-day-num { font-size:.78rem; color:var(--muted); margin-bottom:4px; }
    .cal-event { font-size:.65rem; padding:2px 4px; border-radius:3px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
    .cal-event a { color:inherit; text-decoration:none; }
  </style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<div class="sidebar">
  <div class="sidebar-logo"><h1>🎛️ AM Hub</h1></div>
  <a class="nav-item" href="/dashboard"><span>📊</span> Дашборд</a>
  <a class="nav-item" href="/today"><span>📅</span> Мой день</a>
  <a class="nav-item" href="/clients"><span>👥</span> Клиенты</a>
  <a class="nav-item" href="/kanban"><span>📋</span> Канбан</a>
  <a class="nav-item" href="/checkups"><span>📅</span> Чекапы</a>
  <a class="nav-item active" href="/calendar"><span>📅</span> Календарь</a>
  <a class="nav-item" href="/analytics"><span>📈</span> Аналитика</a>
  <a class="nav-item" href="/sync"><span>🔄</span> Sync</a>
  <a class="nav-item" href="/integrations"><span>🔌</span> Интеграции</a>
  <a class="nav-item" href="/settings"><span>⚙️</span> Настройки</a>
  <div class="sidebar-footer"><a href="/logout" style="color:var(--muted);font-size:.78rem;">→ Выйти</a></div>
</div>

<div class="main">
  <div class="cal-header">
    <h1>📅 Календарь</h1>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">←</button>
      <span id="calMonth" style="font-weight:600;min-width:120px;text-align:center;"></span>
      <button onclick="changeMonth(1)">→</button>
      <button onclick="goToday()">Сегодня</button>
    </div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='light'?'dark':'light';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
let calDate=new Date();
let eventsCache=[];
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

async function loadEvents(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const start=new Date(y,m,1).toISOString().slice(0,10);
  const end=new Date(y,m+1,0).toISOString().slice(0,10);
  try{
    const r=await fetch('/api/calendar/events?start='+start+'&end='+end);
    const d=await r.json();
    eventsCache=d.events||[];
  }catch(e){eventsCache=[];}
  renderCalendar();
}

function renderCalendar(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calMonth').textContent=MONTHS[m]+' '+y;
  const grid=document.getElementById('calGrid');
  grid.innerHTML=DAYS.map(d=>'<div class="cal-day-header">'+d+'</div>').join('');

  const firstDay=new Date(y,m,1);
  let startOffset=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();

  // Previous month days
  const prevDays=new Date(y,m,0).getDate();
  for(let i=startOffset-1;i>=0;i--){
    grid.innerHTML+='<div class="cal-day other-month"><div class="cal-day-num">'+(prevDays-i)+'</div></div>';
  }

  // Current month days
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=dateStr===today.toISOString().slice(0,10);
    const dayEvents=eventsCache.filter(e=>e.start&&e.start.startsWith(dateStr));
    let eventsHtml=dayEvents.slice(0,3).map(e=>'<div class="cal-event" style="background:'+(e.color||'var(--accent)')+'22;color:'+(e.color||'var(--accent)')+';"><a href="'+(e.url||'#')+'">'+e.title+'</a></div>').join('');
    if(dayEvents.length>3) eventsHtml+='<div style="font-size:.62rem;color:var(--muted);">+'+(dayEvents.length-3)+' ещё</div>';
    grid.innerHTML+='<div class="cal-day'+(isToday?' today':'')+'"><div class="cal-day-num">'+d+'</div>'+eventsHtml+'</div>';
  }

  // Next month days
  const totalCells=startOffset+daysInMonth;
  const remaining=(7-totalCells%7)%7;
  for(let i=1;i<=remaining;i++){
    grid.innerHTML+='<div class="cal-day other-month"><div class="cal-day-num">'+i+'</div></div>';
  }
}

function changeMonth(d){calDate.setMonth(calDate.getMonth()+d);loadEvents();}
function goToday(){calDate=new Date();loadEvents();}

loadEvents();
</script>
</body>
</html>
