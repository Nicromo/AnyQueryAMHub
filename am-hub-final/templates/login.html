<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AM Hub — Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px 16px;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .logo span { color: #4361ee; }
    .subtitle {
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
      color: #1a1a2e;
    }
    input:focus { border-color: #4361ee; }
    .btn {
      width: 100%;
      padding: 13px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:hover { background: #3451d1; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-box {
      background: #fff0f0;
      border: 1.5px solid #ffcdd2;
      border-radius: 10px;
      padding: 12px 14px;
      color: #c62828;
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: {{ 'block' if error else 'none' }};
    }
    .hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">AM <span>Hub</span></div>
    <div class="subtitle">Рабочий центр аккаунт-менеджера AnyQuery</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" id="login-form">
      <div class="form-group">
        <label for="username">Логин от Merchrules</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="your@email.com"
          value="{{ username or '' }}"
          autocomplete="username"
          autofocus
          required
        >
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn" id="submit-btn">
        <span id="btn-text">Войти</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </form>

    <div class="hint">
      Используй те же данные что и для входа в<br>
      <strong>Merchrules Dashboard</strong>
    </div>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function() {
  const btn = document.getElementById('submit-btn');
  document.getElementById('btn-text').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  btn.disabled = true;
});
</script>
</body>
</html>
