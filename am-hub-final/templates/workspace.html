<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AM Hub | Command Center</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <!-- Command Palette -->
    <div id="cmd-palette" class="hidden">
        <div class="cmd-overlay"></div>
        <div class="cmd-box">
            <div class="cmd-input-wrapper"><i data-lucide="search"></i><input type="text" id="cmd-input" placeholder="Type command..."></div>
            <div class="cmd-results"><div class="cmd-item">Home Dashboard</div><div class="cmd-item">Clients List</div><div class="cmd-item">Tasks</div></div>
        </div>
    </div>

    <!-- Left Dock -->
    <nav class="left-dock">
        <div class="dock-logo">AQ</div>
        <a href="/" class="dock-item active"><i data-lucide="layout-grid"></i></a>
        <a href="#" class="dock-item"><i data-lucide="users"></i></a>
        <div class="dock-spacer"></div>
        <div class="dock-avatar">DM</div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="search-trigger" onclick="toggleCmdPalette()">
                <i data-lucide="search"></i><span>Search or command...</span><span class="kbd-shortcut">Ctrl K</span>
            </div>
            <div class="user-menu"><span>Dimaa</span></div>
        </header>

        <div class="bento-grid">
            <!-- Hero Card -->
            <div class="card hero-card span-2">
                <div class="card-header"><h3>Active Focus</h3></div>
                <div class="hero-content">
                    <div class="client-info"><div class="client-avatar">12</div><div><h2>12Storeez</h2><p>12storeez.com</p></div></div>
                    <div class="health-score critical"><div class="score-value">62</div><div class="score-label">Health Score</div></div>
                    <div class="quick-stats">
                        <div class="stat"><span class="label">Revenue</span><span class="value">+12%</span></div>
                        <div class="stat"><span class="label">Tickets</span><span class="value danger">3 Open</span></div>
                    </div>
                </div>
            </div>

            <!-- AI Card -->
            <div class="card ai-card">
                <div class="card-header"><h3><i data-lucide="sparkles"></i> AI Insights</h3></div>
                <div class="ai-content">
                    <div class="ai-alert"><i data-lucide="alert-triangle"></i><div><strong>ROAS Drop</strong><p>Below threshold 2.0</p></div></div>
                    <button class="btn-primary btn-sm">Generate Brief</button>
                </div>
            </div>

            <!-- Tasks -->
            <div class="card tasks-card span-2">
                <div class="card-header"><h3>Prioritized Tasks</h3><button class="btn-primary btn-sm">+ New</button></div>
                <ul class="task-list">
                    <li class="task-item"><input type="checkbox"><span>Fix Bug #402</span><span class="badge danger">High</span></li>
                    <li class="task-item"><input type="checkbox"><span>Prepare QBR</span><span class="badge warning">Due Soon</span></li>
                </ul>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
