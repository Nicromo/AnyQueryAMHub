<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AM Hub | Command Center</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <!-- Command Palette -->
    <div id="cmd-palette" class="hidden">
        <div class="cmd-overlay"></div>
        <div class="cmd-box">
            <div class="cmd-input-wrapper"><i data-lucide="search"></i><input type="text" id="cmd-input" placeholder="Search clients, tasks..."></div>
            <div class="cmd-results" id="cmd-results"></div>
        </div>
    </div>

    <!-- Left Dock -->
    <nav class="left-dock">
        <div class="dock-logo">AQ</div>
        <a href="/" class="dock-item active"><i data-lucide="layout-grid"></i></a>
        <div class="dock-spacer"></div>
        <div class="dock-avatar">DM</div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="search-trigger" onclick="toggleCmdPalette()">
                <i data-lucide="search"></i><span>Search...</span><span class="kbd-shortcut">Ctrl K</span>
            </div>
            <button class="btn-primary btn-sm" onclick="loadData()">🔄 Refresh</button>
        </header>

        <div class="bento-grid">
            <!-- Hero Card: Active Client (Dynamic) -->
            <div class="card hero-card span-2">
                <div class="card-header"><h3>Active Focus</h3></div>
                <div id="hero-content" class="hero-content">
                    <div class="skeleton-line"></div><div class="skeleton-line short"></div>
                </div>
            </div>

            <!-- Stats Card -->
            <div class="card stats-card">
                <div class="card-header"><h3>Overview</h3></div>
                <div id="stats-content" class="stats-grid">
                    <div class="stat-item"><span class="label">Clients</span><span class="value" id="stat-clients">-</span></div>
                    <div class="stat-item"><span class="label">Tasks</span><span class="value" id="stat-tasks">-</span></div>
                </div>
            </div>

            <!-- Tasks List (Dynamic) -->
            <div class="card tasks-card span-2">
                <div class="card-header"><h3>Prioritized Tasks</h3><button class="btn-primary btn-sm" onclick="createRandomTask()">+ Add</button></div>
                <ul id="task-list" class="task-list">
                    <li class="skeleton-line"></li><li class="skeleton-line"></li>
                </ul>
            </div>
            
            <!-- AI Insight -->
            <div class="card ai-card span-2">
                <div class="card-header"><h3><i data-lucide="sparkles"></i> AI Insight</h3></div>
                <p id="ai-text" class="ai-text">Analyzing data...</p>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons(); loadData();</script>
</body>
</html>
