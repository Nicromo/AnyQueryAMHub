<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AM Hub | Command Center</title>
    <!-- Добавляем версию v2 для сброса кэша -->
    <link rel="stylesheet" href="/static/css/main.css?v=2">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="cmd-palette" class="hidden">
        <div class="cmd-overlay"></div>
        <div class="cmd-box">
            <div class="cmd-input-wrapper"><i data-lucide="search"></i><input type="text" id="cmd-input" placeholder="Search clients, tasks..."></div>
            <div class="cmd-results" id="cmd-results"></div>
        </div>
    </div>

    <nav class="left-dock">
        <div class="dock-logo">AQ</div>
        <a href="/" class="dock-item active"><i data-lucide="layout-grid"></i></a>
        <a href="#" class="dock-item"><i data-lucide="users"></i></a>
        <div class="dock-spacer"></div>
        <div class="dock-avatar">DM</div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-trigger" onclick="toggleCmdPalette()">
                <i data-lucide="search"></i><span>Search...</span><span class="kbd-shortcut">Ctrl K</span>
            </div>
            <div class="user-menu"><span>Dimaa</span></div>
        </header>

        <div class="bento-grid">
            <div class="card hero-card span-2">
                <div class="card-header"><h3>Active Focus</h3></div>
                <div class="hero-content" id="hero-content">
                    <div class="loading">Загрузка данных...</div>
                </div>
            </div>

            <div class="card ai-card">
                <div class="card-header"><h3><i data-lucide="sparkles"></i> AI Insights</h3></div>
                <div class="ai-content">
                    <div class="ai-alert"><i data-lucide="info"></i><div><strong>System Ready</strong><p>Connected to DB</p></div></div>
                </div>
            </div>

            <div class="card tasks-card span-2">
                <div class="card-header"><h3>Clients List (Top 20)</h3></div>
                <ul class="task-list" id="clients-list">
                    <li class="loading">Loading...</li>
                </ul>
            </div>
        </div>
    </main>

    <script src="/static/js/app.js?v=2"></script>
    <script>
        // Простой скрипт для загрузки клиентов прямо здесь
        fetch('/api/clients')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('clients-list');
                const hero = document.getElementById('hero-content');
                if(data.length > 0) {
                    list.innerHTML = data.map(c => 
                        <li class="task-item"><span>\</span><span class="badge warning">\</span></li>
                    ).join('');
                    hero.innerHTML = 
                        <div class="client-info"><div class="client-avatar">\</div>
                        <div><h2>\</h2><p>Active Client</p></div></div>
                        <div class="health-score"><div class="score-value">OK</div></div>
                    ;
                } else {
                    list.innerHTML = '<li>No clients found in DB</li>';
                }
                lucide.createIcons();
            })
            .catch(e => console.error(e));
    </script>
</body>
</html>
