<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AM Hub | Command Center</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-mode">
    <div id="cmd-palette" class="hidden">
        <div class="cmd-overlay"></div>
        <div class="cmd-box">
            <div class="cmd-input-wrapper"><i data-lucide="search"></i><input type="text" id="cmd-input" placeholder="Type command..."></div>
            <div class="cmd-results"><div class="cmd-item">Home</div><div class="cmd-item">Clients</div></div>
        </div>
    </div>
    <nav class="left-dock"><div class="dock-logo">AQ</div><a href="/" class="dock-item active"><i data-lucide="layout-grid"></i></a><div class="dock-spacer"></div><div class="dock-avatar">DM</div></nav>
    <main class="main-content">
        <header class="top-bar"><div class="search-trigger" onclick="toggleCmdPalette()"><i data-lucide="search"></i><span>Search...</span><span class="kbd-shortcut">Ctrl K</span></div></header>
        <div class="bento-grid">
            <div class="card hero-card span-2"><h3>Active Focus</h3><div class="hero-content"><h2>12Storeez</h2><div class="health-score critical">62</div></div></div>
            <div class="card ai-card"><h3>AI Insights</h3><p>ROAS Drop Detected</p></div>
            <div class="card tasks-card span-2"><h3>Tasks</h3><ul class="task-list"><li>Fix Bug #402</li></ul></div>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
