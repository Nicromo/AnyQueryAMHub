{% extends "base.html" %}
{% block title %}Добро пожаловать — AM Hub{% endblock %}

{% block content %}
<style>
.onb-wrap{max-width:600px;margin:0 auto;padding:32px 20px}
.onb-header{text-align:center;margin-bottom:32px}
.onb-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 16px}
.onb-title{font-size:1.4rem;font-weight:700;margin-bottom:6px}
.onb-sub{font-size:.86rem;color:var(--text-dim);line-height:1.6}
.steps{display:flex;flex-direction:column;gap:10px}
.step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:border-color var(--t),box-shadow var(--t)}
.step.done{border-color:rgba(35,209,139,.3);background:rgba(35,209,139,.03)}
.step.active{border-color:var(--accent-ring);box-shadow:var(--shadow-s)}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--surface-3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;transition:all .2s}
.step.done .step-num{background:rgba(35,209,139,.15);border-color:var(--green);color:var(--green)}
.step.active .step-num{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.step-body{flex:1;min-width:0}
.step-title{font-size:.88rem;font-weight:600;margin-bottom:3px}
.step-desc{font-size:.76rem;color:var(--text-dim);line-height:1.5}
.step-action{margin-top:10px}
.progress-bar-onb{height:4px;background:var(--surface-3);border-radius:2px;margin:16px 0 24px;overflow:hidden}
.progress-fill-onb{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .4s}
</style>

<div class="onb-wrap">
  <div class="onb-header">
    <div class="onb-logo">🎛️</div>
    <div class="onb-title">Добро пожаловать в AM Hub!</div>
    <div class="onb-sub">{{ user.name or user.email }}, давайте настроим всё за несколько минут</div>
  </div>

  <div class="progress-bar-onb">
    <div class="progress-fill-onb" id="onb-progress" style="width:0%"></div>
  </div>

  <div class="steps" id="steps-list">
    <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Загрузка...</div></div>
  </div>

  <div style="margin-top:24px;text-align:center">
    <button class="btn btn-ghost btn-sm" onclick="skipOnboarding()">Пропустить →</button>
  </div>
</div>

<script>
var STEPS = [
  { id: 'merchrules', icon: '🔗', title: 'Подключите Merchrules', desc: 'Ваши клиенты и задачи подтянутся автоматически из CRM.', action: '<a href="/settings" class="btn btn-primary btn-sm">Перейти в настройки</a>' },
  { id: 'add_clients', icon: '👥', title: 'Добавьте клиентов в кабинет', desc: 'Выберите клиентов из общего пула которые находятся в вашей ответственности.', action: '<a href="/cabinet" class="btn btn-primary btn-sm">Открыть кабинет</a>' },
  { id: 'first_task', icon: '✅', title: 'Создайте первую задачу', desc: 'Добавьте задачу по любому клиенту — это займёт 10 секунд.', action: '<a href="/tasks" class="btn btn-primary btn-sm">Перейти к задачам</a>' },
  { id: 'tg_connect', icon: '📱', title: 'Подключите Telegram', desc: 'Получайте умные уведомления о просрочках и важных событиях.', action: '<a href="/settings#telegram" class="btn btn-primary btn-sm">Подключить</a>' },
  { id: 'first_checkup', icon: '🔍', title: 'Запустите первый чекап', desc: 'Установите AM Hub Extension и проверьте качество поиска одного клиента.', action: '<a href="/checkups" class="btn btn-primary btn-sm">К чекапам</a>' },
];

async function loadSteps() {
  var d = await fetch('/api/onboarding/status').then(r=>r.json()).catch(()=>({steps:[]}));
  var completed = new Set((d.steps||[]).filter(s=>s.done).map(s=>s.id));
  var done = completed.size;

  document.getElementById('onb-progress').style.width = Math.round(done/STEPS.length*100)+'%';

  document.getElementById('steps-list').innerHTML = STEPS.map(function(s, i) {
    var isDone = completed.has(s.id);
    var isActive = !isDone && i === done;
    var cls = isDone ? 'done' : isActive ? 'active' : '';
    var numContent = isDone ? '✓' : (i+1);
    return '<div class="step '+cls+'" id="step-'+s.id+'">'
      + '<div class="step-num">'+numContent+'</div>'
      + '<div class="step-body">'
      +   '<div class="step-title">'+s.icon+' '+s.title+'</div>'
      +   '<div class="step-desc">'+s.desc+'</div>'
      +   (isDone ? '' : '<div class="step-action">'+s.action+'</div>')
      + '</div>'
      + (isDone ? '' : '<button class="btn btn-ghost btn-sm" style="flex-shrink:0;padding:4px 8px;font-size:.7rem" onclick="markDone(\''+s.id+'\')">✓ Готово</button>')
      + '</div>';
  }).join('');

  if (done === STEPS.length) {
    setTimeout(function() { window.location.href = '/dashboard'; }, 1500);
  }
}

async function markDone(stepId) {
  await fetch('/api/onboarding/complete-step', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({step: stepId})
  });
  loadSteps();
}

async function skipOnboarding() {
  await fetch('/api/onboarding/skip', {method: 'POST'});
  window.location.href = '/dashboard';
}

loadSteps();
</script>
{% endblock %}
