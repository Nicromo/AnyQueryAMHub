<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналитика — AM Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0a0e1a; --card:#111827; --border:#1e2a3a; --text:#e2e8f0; --muted:#64748b; --accent:#6366f1; --green:#22c55e; --yellow:#eab308; --red:#ef4444; }
    [data-theme="light"] { --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --text:#1e293b; --muted:#64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .main { margin-left:240px; padding:24px 28px; }
    .sidebar { position:fixed; left:0; top:0; bottom:0; width:240px; background:var(--card); border-right:1px solid var(--border); padding:20px 0; z-index:100; }
    .sidebar-logo { padding:0 20px 20px; border-bottom:1px solid var(--border); }
    .sidebar-logo h1 { font-size:1.1rem; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 20px; color:var(--muted); font-size:.85rem; text-decoration:none; border-left:3px solid transparent; }
    .nav-item:hover { color:var(--text); text-decoration:none; background:rgba(255,255,255,.03); }
    .nav-item.active { color:var(--accent); background:rgba(99,102,241,.12); border-left-color:var(--accent); }
    .sidebar-footer { position:absolute; bottom:0; left:0; right:0; padding:16px 20px; border-top:1px solid var(--border); }
    a { color:var(--accent); text-decoration:none; }
    h1 { font-size:1.4rem; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.82rem; margin-bottom:20px; }
    .theme-btn { position:fixed; top:16px; right:16px; padding:8px 12px; border-radius:8px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:1rem; z-index:200; }
    .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
    @media(max-width:800px){.charts-row{grid-template-columns:1fr;}}
    .chart-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; }
    .chart-title { font-size:.9rem; font-weight:600; margin-bottom:14px; }
    .chart-wrap { position:relative; height:250px; }
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:20px; }
    .kpi { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; text-align:center; }
    .kpi .v { font-size:1.8rem; font-weight:700; }
    .kpi .l { font-size:.72rem; color:var(--muted); text-transform:uppercase; margin-top:4px; }
  </style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<div class="sidebar">
  <div class="sidebar-logo"><h1>🎛️ AM Hub</h1></div>
  <a class="nav-item" href="/dashboard"><span>📊</span> Дашборд</a>
  <a class="nav-item" href="/today"><span>📅</span> Мой день</a>
  <a class="nav-item" href="/clients"><span>👥</span> Клиенты</a>
  <a class="nav-item" href="/kanban"><span>📋</span> Канбан</a>
  <a class="nav-item" href="/checkups"><span>📅</span> Чекапы</a>
  <a class="nav-item" href="/calendar"><span>📅</span> Календарь</a>
  <a class="nav-item active" href="/analytics"><span>📈</span> Аналитика</a>
  <a class="nav-item" href="/sync"><span>🔄</span> Sync</a>
  <a class="nav-item" href="/integrations"><span>🔌</span> Интеграции</a>
  <a class="nav-item" href="/settings"><span>⚙️</span> Настройки</a>
  <div class="sidebar-footer"><a href="/logout" style="color:var(--muted);font-size:.78rem;">→ Выйти</a></div>
</div>

<div class="main">
  <h1>📈 Аналитика</h1>
  <p class="sub">Обзор по всем клиентам</p>

  <div class="kpi-grid" id="kpiGrid"></div>

  <div class="charts-row">
    <div class="chart-card"><div class="chart-title">Клиенты по сегментам</div><div class="chart-wrap"><canvas id="segChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Health Score</div><div class="chart-wrap"><canvas id="healthChart"></canvas></div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><div class="chart-title">Задачи по статусам</div><div class="chart-wrap"><canvas id="taskChart"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Встречи по месяцам</div><div class="chart-wrap"><canvas id="meetingsChart"></canvas></div></div>
  </div>
</div>

<script>
function toggleTheme(){const h=document.documentElement;const t=h.getAttribute('data-theme')==='light'?'dark':'light';h.setAttribute('data-theme',t);localStorage.setItem('theme',t);}
const s=localStorage.getItem('theme');if(s) document.documentElement.setAttribute('data-theme',s);

async function loadAnalytics(){
  try{
    const r=await fetch('/api/analytics');
    const d=await r.json();
    document.getElementById('kpiGrid').innerHTML=
      '<div class="kpi"><div class="v">'+d.total_clients+'</div><div class="l">Клиентов</div></div>'+
      '<div class="kpi"><div class="v" style="color:var(--green)">'+d.avg_health+'%</div><div class="l">Ср. Health</div></div>'+
      '<div class="kpi"><div class="v">'+d.total_tasks+'</div><div class="l">Задач</div></div>'+
      '<div class="kpi"><div class="v">'+Object.keys(d.meetings_per_month||{}).length+'</div><div class="l">Мес. с встречами</div></div>';

    // Segments
    const segLabels=Object.keys(d.segments||{});
    new Chart(document.getElementById('segChart'),{type:'bar',data:{labels:segLabels,datasets:[{data:segLabels.map(l=>d.segments[l]),backgroundColor:['rgba(59,130,246,.6)','rgba(168,85,247,.6)','rgba(34,197,94,.6)','rgba(249,115,22,.6)'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#64748b'},grid:{display:false}}}}});

    // Health
    const hLabels=Object.keys(d.health_distribution||{});
    new Chart(document.getElementById('healthChart'),{type:'doughnut',data:{labels:hLabels,datasets:[{data:hLabels.map(l=>d.health_distribution[l]),backgroundColor:['rgba(239,68,68,.7)','rgba(234,179,8,.7)','rgba(59,130,246,.7)','rgba(34,197,94,.7)'],borderWidth:0,spacing:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',padding:12,font:{size:10}}}}}});

    // Tasks
    const tLabels=Object.keys(d.task_status||{});
    new Chart(document.getElementById('taskChart'),{type:'bar',data:{labels:tLabels,datasets:[{data:tLabels.map(l=>d.task_status[l]),backgroundColor:['rgba(59,130,246,.6)','rgba(168,85,247,.6)','rgba(34,197,94,.6)','rgba(239,68,68,.6)'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#64748b'},grid:{display:false}}}}});

    // Meetings per month
    const mLabels=Object.keys(d.meetings_per_month||{}).reverse();
    new Chart(document.getElementById('meetingsChart'),{type:'line',data:{labels:mLabels,datasets:[{data:mLabels.map(l=>d.meetings_per_month[l]),borderColor:'var(--accent)',backgroundColor:'rgba(99,102,241,.1)',fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{color:'#64748b'},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#64748b'},grid:{display:false}}}}});
  }catch(e){console.error(e);}
}
loadAnalytics();
</script>
</body>
</html>
