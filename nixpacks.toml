[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
  "python3.12 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "/opt/venv/bin/pip install -r am-hub-final/requirements.txt"
]

[phases.build]
cmds = ["mkdir -p am-hub-final/data"]

[start]
cmd = "cd am-hub-final && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
