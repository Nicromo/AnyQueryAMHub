<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — AM Hub</title>
  <style>
    :root {
      --bg: #0a0e1a; --card: #111827; --border: #1e2a3a;
      --text: #e2e8f0; --muted: #64748b; --accent: #6366f1;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; transition:background .3s; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .logo { font-size:2.5rem; margin-bottom:8px; }
    h1 { font-size:1.5rem; font-weight:700; margin-bottom:4px; }
    .sub { color:var(--muted); font-size:.85rem; margin-bottom:28px; }
    label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:6px; font-weight:500; }
    input { width:100%; padding:11px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:.95rem; outline:none; margin-bottom:16px; transition:border .15s; }
    input:focus { border-color:var(--accent); }
    .btn { width:100%; padding:12px; border:none; border-radius:10px; background:var(--accent); color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; transition:filter .15s; }
    .btn:hover { filter:brightness(1.1); }
    .err { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); border-radius:10px; padding:10px 14px; font-size:.85rem; color:#f87171; margin-bottom:16px; }
    .theme-toggle { position:fixed; top:16px; right:16px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 12px; cursor:pointer; font-size:1.1rem; color:var(--text); transition:all .15s; }
    .theme-toggle:hover { border-color:var(--accent); }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" title="Тема">🌓</button>
  <div class="card">
    <div class="logo">🎛️</div>
    <h1>AM Hub</h1>
    <p class="sub">Enterprise Account Manager</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@company.ru" required autofocus>
      <label>Пароль</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit" class="btn">Войти</button>
    </form>
  </div>
  <script>
    function toggleTheme() {
      const h = document.documentElement;
      const t = h.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      h.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
    }
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
