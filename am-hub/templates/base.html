<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AM Hub{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
{% block body %}
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">AM <span>Hub</span></div>
    <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
      <span class="icon">📊</span> Чекапы
    </a>
    <div class="sidebar-bottom">
      {% if user %}
        👤 {{ user.name }}<br>
        <a href="/logout" style="color:var(--text-muted)">Выйти</a>
      {% endif %}
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}

{% if request.query_params.get('saved') %}
<div class="toast success" id="toast">✅ Фолоуап сохранён{% if request.query_params.get('tg') == 'ok' %} и отправлен в TG{% endif %}</div>
<script>setTimeout(()=>document.getElementById('toast')?.remove(), 4000)</script>
{% endif %}
</body>
</html>
